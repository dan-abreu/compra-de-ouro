version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: compra_ouro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: compra_ouro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d compra_ouro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
